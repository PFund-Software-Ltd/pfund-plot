[workspace]
authors = ["softwareentrepreneer <softwareentrepreneer+pfund-plot@gmail.com>"]
channels = ["conda-forge"]
name = "pfund-plot"
platforms = ["osx-arm64", "linux-64"]
# updating this needs to also update the version in the ci.yml and templates/ci-workflow-template.yml files
requires-pixi = ">=0.63.2"  # command: pixi workspace requires-pixi set ">=0.63.2

[tasks]

[tasks.test-all]
depends-on = [
  { task = "test", environment = "py311" },
  { task = "test", environment = "py312" },
  { task = "test", environment = "py313" },
]

[dependencies]
python = ">=3.11.14"
uv = ">=0.11.2"
gh = ">=2.87.2"

[pypi-dependencies]
pfund-kit = ">=0.1.6"
panel = ">=1.8.10"
hvplot = ">=0.12.2"
anywidget = ">=0.10.0"
ipywidgets-bokeh = ">=1.7.0"
pywebview = ">=6.1"
datashader = ">=0.19.0"

[pypi-options.dependency-overrides]
pfund-plot = { path = ".", editable = true }

[environments]
default = ["py311", "dev", "optional"]
py311 = ["py311", "test", "optional"]
py312 = ["py312", "test", "optional"]
py313 = ["py313", "test", "optional"]

[feature.optional.pypi-dependencies]
# TEMP
# pfeed = ">=0.0.5"
pfeed = { path = "../pfeed", editable = true }
pfund = { path = "../pfund", editable = true }
marimo = { version = ">=0.23.4", extras = ["recommended", "lsp"] }
jupyter-bokeh = ">=4.0.5"
notebook = ">=7.5.5"
papermill = ">=2.7.0"
voila = ">=0.5.12"
matplotlib = ">=3.10.9"
plotly = ">=6.7.0"
altair = ">=6.1.0"

[feature.dev.dependencies]
ta-lib = ">=0.6.4"

[feature.dev.pypi-dependencies]
pfund-plot = { path = ".", editable = true }
afterpython = ">=0.3.2"
basedpyright = ">=1.39.3"
watchfiles = ">=1.1.1"  # "panel serve myfile.py --dev" requires watchfiles installed to autoreload
selenium = ">=4.39.0"  # saving bokeh images requires selenium
bokeh-sampledata = ">=2025.0"
hvsampledata = ">=0.1.4"
vega-datasets = ">=0.9.0"

[feature.test.pypi-dependencies]
pytest = ">=9.0.2"
pytest-cov = ">=7.0.0"
pytest-mock = ">=3.15.1"
pytest-xdist = ">=3.8.0"
[feature.test.tasks]
test = "pytest -v -n auto"

[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

[feature.py313.dependencies]
python = "3.13.*"
