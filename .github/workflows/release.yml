name: Release to PyPI and GitHub

on:
  push:
    tags:
      - 'v*'  # Trigger on all version tags (v0.1.0, v0.1.0rc1, v0.1.0.dev4, etc.)

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for creating GitHub releases
      id-token: write  # Required for PyPI trusted publishing

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.67.2
          cache: true
          # Install the conda toolchain (nodejs, pnpm, uv, ...) from the committed
          # lock as-is. Do NOT use --locked (setup-pixi's default): a release tag
          # points at the version-bump commit, whose pixi.lock still records the
          # PRE-bump version — afterpython refreshes the lock in a SEPARATE commit
          # made *after* tagging, so the up-to-date lock is never in the tag.
          frozen: true

      - name: Install js-tap dependencies
        run: pixi run pnpm install --frozen-lockfile
        working-directory: ./js-tap

      - name: Build & package JS components
        # MUST run before `uv build`: uv_build has no build hooks, so js-package
        # builds the bundles and copies them into pfund_plot/js_tap/components/
        # first, then the wheel ships them as package data.
        run: pixi run js-package

      - name: Build package
        run: pixi run uv build

      - name: Publish to PyPI
        run: pixi run uv publish

      - name: Determine if pre-release
        id: check_prerelease
        run: |
          # Extract version from tag (remove 'v' prefix)
          VERSION="${GITHUB_REF_NAME#v}"

          # Check if this is a pre-release or dev version
          # Matches: dev, rc, alpha, beta, a1, b2 (but not 'stable-version')
          if [[ "$VERSION" =~ (dev|rc|alpha|beta|a[0-9]+|b[0-9]+) ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: false
          prerelease: ${{ steps.check_prerelease.outputs.prerelease }}
          files: dist/*  # Attach built packages (wheel + sdist)
